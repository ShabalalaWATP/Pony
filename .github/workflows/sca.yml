name: sca

on:
  pull_request:
  push:

permissions:
  contents: read
  security-events: write

jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pip-audit
      - run: pip-audit -r apps/backend/requirements.lock -r apps/sensor-agent/requirements.lock
      - name: Install OSV-Scanner
        run: |
          curl -sSfL -o /tmp/osv-scanner https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64
          sudo install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner
      - run: osv-scanner scan source -r .
      - name: Install Trivy
        run: |
          curl -sSfL -o /tmp/trivy.tar.gz https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo install -m 0755 /tmp/trivy /usr/local/bin/trivy
      - run: trivy fs --severity HIGH,CRITICAL --exit-code 1 --format sarif --output trivy-results.sarif .
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
