name: sca

on:
  pull_request:
  push:

permissions:
  contents: read
  security-events: write

env:
  OSV_SCANNER_VERSION: "v2.3.8"
  OSV_SCANNER_SHA256: "bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc"
  TRIVY_VERSION: "0.70.0"
  TRIVY_SHA256: "8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9"

jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pip-audit
      # Ignored advisories — see `osv-scanner.toml` for the same list +
      # the documented reason. Mirror the ignores here so pip-audit and
      # osv-scanner agree about what's accepted risk vs. real finding.
      #   PYSEC-2025-183 — disputed pyjwt advisory; key length is the
      #     caller's responsibility, `CHEEKY_PONY_JWT_SECRET` is required
      #     ≥32 random bytes and `config.py` rejects known dev defaults
      #     in prod. No upstream fix; maintainer disputes. See
      #     docs/threat-model.md "Accepted advisory exceptions".
      - run: >
          pip-audit
          --ignore-vuln PYSEC-2025-183
          -r apps/backend/requirements.lock
          -r apps/sensor-agent/requirements.lock
      - name: Install OSV-Scanner
        run: |
          curl -sSfL -o /tmp/osv-scanner "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SCANNER_SHA256}  /tmp/osv-scanner" | sha256sum -c -
          sudo install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner
      - name: Run OSV-Scanner
        run: |
          for attempt in 1 2 3; do
            if osv-scanner scan source --config osv-scanner.toml -r .; then
              exit 0
            fi
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            echo "::warning::OSV-Scanner failed with exit $status; retrying"
            sleep $((attempt * 15))
          done
      - name: Install Trivy
        run: |
          curl -sSfL -o /tmp/trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum -c -
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo install -m 0755 /tmp/trivy /usr/local/bin/trivy
      - run: trivy fs --severity HIGH,CRITICAL --exit-code 1 --format sarif --output trivy-results.sarif .
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
