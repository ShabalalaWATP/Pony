name: dast

on:
  pull_request:
  workflow_dispatch:

jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start DAST stack
        run: docker compose -f infra/docker-compose.dast.yml up -d --build
      - name: Wait for backend container health
        shell: bash
        run: |
          timeout 180 bash -c '
            until [ "$(docker inspect --format="{{.State.Health.Status}}" "$(docker compose -f infra/docker-compose.dast.yml ps -q backend)" 2>/dev/null)" = "healthy" ]; do
              docker compose -f infra/docker-compose.dast.yml ps
              docker compose -f infra/docker-compose.dast.yml logs --no-color --tail=80 backend mongo redis
              sleep 5
            done
          '
          docker compose -f infra/docker-compose.dast.yml exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      - uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8000
          artifact_name: zap-baseline
          fail_action: true
          allow_issue_writing: false
      - uses: zaproxy/action-full-scan@v0.12.0
        if: contains(github.event.pull_request.labels.*.name, 'run-dast-full')
        with:
          target: http://localhost:8000
          artifact_name: zap-full
          fail_action: true
          allow_issue_writing: false
      - name: Dump DAST logs on failure
        if: failure()
        run: |
          docker compose -f infra/docker-compose.dast.yml ps
          docker compose -f infra/docker-compose.dast.yml logs --no-color --timestamps
      - run: docker compose -f infra/docker-compose.dast.yml down -v
        if: always()
