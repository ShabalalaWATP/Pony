name: fuzz

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Atheris runtime in seconds, max 3600"
        required: false
        default: "3600"

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend fuzz dependencies
        run: python -m pip install -e "packages/shared-types[dev]" -e "apps/backend[dev]"
      - name: Resolve fuzz duration
        id: duration
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DURATION_SECONDS: ${{ inputs.duration_seconds }}
        run: |
          duration=60
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            duration="${INPUT_DURATION_SECONDS:-3600}"
          fi
          if ! [[ "$duration" =~ ^[0-9]+$ ]] || [ "$duration" -lt 1 ] || [ "$duration" -gt 3600 ]; then
            echo "duration_seconds must be an integer from 1 to 3600" >&2
            exit 1
          fi
          echo "seconds=$duration" >> "$GITHUB_OUTPUT"
      - name: Run alert regex fuzz smoke
        run: |
          mkdir -p apps/backend/tests/fuzz/artifacts
          python apps/backend/tests/fuzz/test_alert_regex_fuzz.py \
            -max_total_time="${{ steps.duration.outputs.seconds }}" \
            -timeout=2 \
            -rss_limit_mb=1024 \
            -artifact_prefix=apps/backend/tests/fuzz/artifacts/
