name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Temporary backend image tag for release workflow verification"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          image_tag="$REF_NAME"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            image_tag="$INPUT_IMAGE_TAG"
          fi
          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid image tag: $image_tag" >&2
            exit 1
          fi
          repository="$(printf '%s' "$REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image_ref="${REGISTRY}/${repository}/backend:${image_tag}"
          workflow_ref="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}"
          {
            echo "image_ref=$image_ref"
            echo "image_tag=$image_tag"
            echo "sbom_file=backend.spdx.json"
            echo "workflow_ref=$workflow_ref"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
      - name: Generate backend SPDX SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image_ref }}
          format: spdx-json
          output-file: ${{ steps.meta.outputs.sbom_file }}
          upload-artifact: false
          upload-release-assets: false
      - uses: sigstore/cosign-installer@v3

      - name: Sign backend image
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Sign backend SBOM
        env:
          SBOM_FILE: ${{ steps.meta.outputs.sbom_file }}
        run: |
          cosign sign-blob --yes \
            --output-signature "${SBOM_FILE}.sig" \
            --output-certificate "${SBOM_FILE}.pem" \
            "$SBOM_FILE"

      - name: Verify signatures
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
          SBOM_FILE: ${{ steps.meta.outputs.sbom_file }}
          WORKFLOW_REF: ${{ steps.meta.outputs.workflow_ref }}
        run: |
          cosign verify "$IMAGE_REF" \
            --certificate-identity "$WORKFLOW_REF" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          cosign verify-blob "$SBOM_FILE" \
            --signature "${SBOM_FILE}.sig" \
            --certificate "${SBOM_FILE}.pem" \
            --certificate-identity "$WORKFLOW_REF" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - uses: actions/upload-artifact@v4
        with:
          name: backend-sbom-and-signature
          if-no-files-found: error
          path: |
            backend.spdx.json
            backend.spdx.json.sig
            backend.spdx.json.pem

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          files: |
            backend.spdx.json
            backend.spdx.json.sig
            backend.spdx.json.pem
