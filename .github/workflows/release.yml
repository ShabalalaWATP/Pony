name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: backend
            dockerfile: apps/backend/Dockerfile
          - name: sensor-agent
            dockerfile: apps/sensor-agent/Dockerfile
          - name: frontend
            dockerfile: infra/frontend-placeholder.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:${{ github.ref_name }}
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:${{ github.ref_name }}
          format: spdx-json
          output-file: ${{ matrix.image.name }}.spdx.json
      - uses: sigstore/cosign-installer@v3
      - name: Sign image
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:${{ github.ref_name }}
        run: cosign sign --yes "$IMAGE_REF"
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.spdx.json"
