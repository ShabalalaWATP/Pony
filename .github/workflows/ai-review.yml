name: ai-review

on:
  pull_request:

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      HAS_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        if: env.HAS_ANTHROPIC_API_KEY == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Skip when Claude secret is not configured
        if: env.HAS_ANTHROPIC_API_KEY != 'true'
        run: echo "ANTHROPIC_API_KEY is not configured; skipping optional AI review."
