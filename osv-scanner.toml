[[IgnoredVulns]]
id = "PYSEC-2025-183"
reason = """
Disputed advisory against pyjwt: 'key length is chosen by the
application that uses the library'. Cheeky Pony's
CHEEKY_PONY_JWT_SECRET is required to be at least 32 random bytes,
and config.py rejects known dev defaults at startup in prod-like
environments. Upstream maintainer disputes the advisory and no
patched release exists. CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:L/I:L/A:H
— high attack complexity, low impact, applicable only to apps
choosing very short keys. Not us.
"""
