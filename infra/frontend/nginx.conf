# Security-hardened nginx config for the Cheeky Pony frontend.
#
# We run as the unprivileged `nginx` user provided by the upstream
# image (UID 101); the master process is launched with `-g 'daemon
# off;'` from the Dockerfile so PID 1 == this process and writable
# state lives under /tmp + /var/cache/nginx/ which the user already
# owns.

worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # Move every writable path into /tmp so the non-root user can write
  # without `chown`ing the system paths.
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;
  access_log            /dev/stdout combined;

  server_tokens off;
  charset utf-8;

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Static security headers ---
    # CSP: default lock-down + the narrow set of origins this app
    # actually loads. Notes:
    #   - `script-src 'self'` — Vite emits hashed JS bundles only,
    #     no inline scripts.
    #   - `style-src 'self' 'unsafe-inline'` — Tailwind injects a
    #     small bootstrap inline; we can drop `unsafe-inline` once
    #     we move to nonce-based CSP.
    #   - `img-src` covers app assets (self), Tailscale/MapLibre
    #     tile vendors (`https://demotiles.maplibre.org`), plus
    #     `data:` for inline icons and `blob:` for the MapLibre
    #     canvas snapshot.
    #   - `font-src` allows the bundled self-hosted Geist /
    #     JetBrains Mono webfonts.
    #   - `connect-src` allows the backend over the same origin
    #     plus the operator WebSocket. The proxy forwards to the
    #     backend so same-origin covers both.
    #   - `frame-ancestors 'none'` substitutes for X-Frame-Options.
    set $csp "default-src 'self'; ";
    set $csp "${csp}script-src 'self'; ";
    set $csp "${csp}style-src 'self' 'unsafe-inline'; ";
    set $csp "${csp}img-src 'self' data: blob: https://demotiles.maplibre.org; ";
    set $csp "${csp}font-src 'self' data:; ";
    set $csp "${csp}connect-src 'self' ws: wss: https://demotiles.maplibre.org; ";
    set $csp "${csp}object-src 'none'; ";
    set $csp "${csp}base-uri 'self'; ";
    set $csp "${csp}form-action 'self'; ";
    set $csp "${csp}frame-ancestors 'none';";

    add_header Content-Security-Policy $csp always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    # `frame-ancestors 'none'` above already blocks framing, but
    # the legacy header keeps older browsers / mid-boxes honest.
    add_header X-Frame-Options "DENY" always;
    # Cross-origin isolation defaults are safe for an SPA that
    # doesn't embed third-party widgets.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # SPA fallback — every unknown path resolves to index.html so
    # TanStack Router can take it from there.
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets; the bundle filename changes on every
    # build so we can be aggressive.
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      # Re-emit the security headers — `add_header` doesn't inherit
      # across nested locations in nginx.
      add_header Content-Security-Policy $csp always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
      add_header X-Frame-Options "DENY" always;
      try_files $uri =404;
    }
  }
}
