services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    command: python -m uvicorn cheeky_pony_backend.main:create_app --factory --host 0.0.0.0 --port 8000 --reload
    environment:
      CHEEKY_PONY_ENV: dev
      CHEEKY_PONY_LAB_MODE: "false"
      CHEEKY_PONY_MONGO_DSN: mongodb://mongo:27017
      CHEEKY_PONY_MONGO_DB: cheeky_pony
      CHEEKY_PONY_REDIS_DSN: redis://redis:6379/0
      CHEEKY_PONY_JWT_SECRET: dev-only-change-me-dev-only-change-me
      CHEEKY_PONY_COOKIE_SECURE: "false"
      CHEEKY_PONY_CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ../apps/backend/src:/app/apps/backend/src
      - ../packages/shared-types/src:/app/packages/shared-types/src
    depends_on:
      - mongo
      - redis

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend-placeholder.Dockerfile
    ports:
      - "5173:80"

volumes:
  mongo-data:
