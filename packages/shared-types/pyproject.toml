[project]
name = "cheeky-pony-shared"
version = "0.1.0"
description = "Shared Pydantic contracts for Cheeky Pony."
requires-python = ">=3.12"
license = { text = "AGPL-3.0-only" }
dependencies = [
  "pydantic>=2.10,<3",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-cov>=6.0",
  "ruff>=0.8",
  "mypy>=1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cheeky_pony_shared"]
